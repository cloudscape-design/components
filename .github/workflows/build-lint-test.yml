name: Build, lint and test

on:
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  id-token: write
  actions: read
  contents: read
  security-events: write

jobs:
  build:
    name: build${{ matrix.react != 16 && format(' (React {0})', matrix.react) || '' }}
    strategy:
      matrix:
        react: [16, 18]
    uses: cloudscape-design/actions/.github/workflows/build-lint-test.yml@main
    secrets: inherit
    with:
      react-version: ${{ matrix.react }}
