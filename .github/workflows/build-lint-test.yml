name: Build, lint and test

on:
  workflow_run:
    workflows:
      - Build
    types:
      - completed

permissions:
  id-token: write
  actions: read
  contents: read
  security-events: write
  deployments: write

jobs:
  deploy:
    name: deploy${{ matrix.react != 16 && format(' (React {0})', matrix.react) || '' }}
    # Only deploy for PRs from the same repo (not forks) when the build succeeded.
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    strategy:
      matrix:
        react: [16, 18]
    uses: cloudscape-design/actions/.github/workflows/deploy.yml@main
    secrets: inherit
    with:
      artifact-name: dev-pages-react${{ matrix.react }}
      deployment-path: pages/lib/static-default
